name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      APP_NAME: ${{ secrets.APP_NAME || 'nant-be' }}
      RUN_MIGRATE_DEPLOY: ${{ secrets.RUN_MIGRATE_DEPLOY || 'true' }}
      PRISMA_BASELINE_MIGRATION: ${{ secrets.PRISMA_BASELINE_MIGRATION }}
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Validate deploy vars
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing DEPLOY_HOST" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing DEPLOY_USER" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing DEPLOY_PATH" && exit 1)
          echo "Deploy target: $DEPLOY_USER@$DEPLOY_HOST:${DEPLOY_PORT:-22}"
          echo "Deploy path: $DEPLOY_PATH"

      - name: Deploy on server
        run: |
          APP_ENV_FILE_B64=""
          DATABASE_URL_B64=""

          if [ -n "$APP_ENV_FILE" ]; then
            APP_ENV_FILE_B64="$(printf '%s' "$APP_ENV_FILE" | base64 | tr -d '\n')"
          fi

          if [ -n "$DATABASE_URL" ]; then
            DATABASE_URL_B64="$(printf '%s' "$DATABASE_URL" | base64 | tr -d '\n')"
          fi

          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' APP_NAME='$APP_NAME' RUN_MIGRATE_DEPLOY='$RUN_MIGRATE_DEPLOY' PRISMA_BASELINE_MIGRATION='$PRISMA_BASELINE_MIGRATION' APP_ENV_FILE_B64='$APP_ENV_FILE_B64' DATABASE_URL_B64='$DATABASE_URL_B64' bash -s" <<'EOF'
          set -e

          # Load nvm for non-interactive SSH shells when available.
          export NVM_DIR="$HOME/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
            nvm use --lts >/dev/null 2>&1 || true
          fi

          if ! command -v npm >/dev/null 2>&1; then
            echo "npm not found on server PATH. Install Node.js/NPM or configure NVM for user $USER."
            exit 127
          fi

          if ! command -v git >/dev/null 2>&1; then
            echo "git not found on server PATH. Install git before deploy."
            exit 127
          fi

          cd "$DEPLOY_PATH"

          if [ ! -d .git ]; then
            echo "DEPLOY_PATH is not a git repository: $DEPLOY_PATH"
            echo "Please clone your repository on the server first."
            exit 1
          fi

          # Always deploy the latest code from origin/main.
          git fetch origin main
          git reset --hard origin/main

          if [ -n "$APP_ENV_FILE_B64" ] && [ ! -f .env ]; then
            printf '%s' "$APP_ENV_FILE_B64" | base64 -d > .env
            echo ".env created from secret."
          else
            echo ".env already exists on server — skipping overwrite."
          fi

          if [ -f .env ]; then
            set -a
            . ./.env
            set +a
          fi

          if [ -z "$DATABASE_URL" ] && [ -n "$DATABASE_URL_B64" ]; then
            export DATABASE_URL="$(printf '%s' "$DATABASE_URL_B64" | base64 -d)"
          fi


          npm ci
          npx prisma generate
          npm run build

          if [ "$RUN_MIGRATE_DEPLOY" = "true" ]; then
            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is missing. Set APP_ENV_FILE secret (or provide DATABASE_URL in server env)."
              exit 1
            fi

            if ! npx prisma migrate deploy; then
              if [ -n "$PRISMA_BASELINE_MIGRATION" ]; then
                echo "migrate deploy failed. Attempting one-time baseline with migration: $PRISMA_BASELINE_MIGRATION"
                npx prisma migrate resolve --applied "$PRISMA_BASELINE_MIGRATION"
                npx prisma migrate deploy
              else
                echo "migrate deploy failed. If this is an existing non-empty DB (P3005), set PRISMA_BASELINE_MIGRATION secret (example: init)."
                exit 1
              fi
            fi
          fi

          if command -v pm2 >/dev/null 2>&1; then
            pm2 restart "$APP_NAME" || pm2 start dist/main.js --name "$APP_NAME"
            pm2 save
          else
            echo "pm2 not found on server. Please install pm2 or adjust deploy command."
            exit 1
          fi
          EOF

